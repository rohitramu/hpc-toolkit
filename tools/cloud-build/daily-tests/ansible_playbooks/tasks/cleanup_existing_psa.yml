---
- name: PSA Cleanup Block
  block:
  - name: Debug PSA cleanup vars
    ansible.builtin.debug:
      msg: "Cleaning up PSA for network: {{ resolved_network }}, project: {{ project }}"
    when: resolved_network is defined and project is defined

  - name: Clean up existing PSA Peering (Blind Delete)
    register: psa_deleted
    changed_when: psa_deleted.rc == 0
    failed_when: false
    delegate_to: localhost
    ansible.builtin.command: >-
      gcloud services vpc-peerings delete
      --service=servicenetworking.googleapis.com
      --network={{ resolved_network }}
      --project={{ project }}
      --quiet
    # Run blindly to attempt clearing ghost peerings even if network is deleted
    when: resolved_network is defined and resolved_network != "" and project is defined

  - name: Debug Peering deletion output
    ansible.builtin.debug:
      msg:
      - "rc: {{ psa_deleted.rc }}"
      - "stdout: {{ psa_deleted.stdout }}"
      - "stderr: {{ psa_deleted.stderr }}"
    when: psa_deleted is defined and psa_deleted.rc is defined and psa_deleted.rc != 0

  - name: Check for existing PSA address
    register: existing_psa_addr
    changed_when: false
    failed_when: false
    ansible.builtin.command: >-
      gcloud compute addresses list
      --project={{ project }}
      --global
      --filter="network=projects/{{ project }}/global/networks/{{ resolved_network }}"
      --format="value(name)"
    when: resolved_network is defined and resolved_network != "" and project is defined

  - name: Clean up existing PSA Address
    register: addr_deleted
    changed_when: addr_deleted.rc == 0
    failed_when: false
    ansible.builtin.command: >-
      gcloud compute addresses delete {{ item }}
      --project={{ project }}
      --global
      --quiet
    loop: "{{ existing_psa_addr.stdout_lines | default([]) }}"
    when: >-
      project is defined and
      existing_psa_addr.rc is defined and existing_psa_addr.rc == 0
  vars:
    resolved_network: "{{ psa_network | default(network) }}"
