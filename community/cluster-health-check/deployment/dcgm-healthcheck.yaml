apiVersion: v1
kind: ServiceAccount
metadata:
  name: dcgm-healthcheck
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dcgm-healthcheck-node-patcher
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/status"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dcgm-healthcheck-node-patcher-binding
subjects:
- kind: ServiceAccount
  name: dcgm-healthcheck
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: dcgm-healthcheck-node-patcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-healthcheck
  namespace: kube-system
  labels:
    app: dcgm-healthcheck
spec:
  selector:
    matchLabels:
      app: dcgm-healthcheck
  template:
    metadata:
      labels:
        app: dcgm-healthcheck
    spec:
      serviceAccountName: dcgm-healthcheck
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cloud.google.com/gke-accelerator
                operator: Exists
      initContainers:
      - name: nvml-wait
        image: gke.gcr.io/gke-distroless/bash:gke_distroless_20240307.00_p0
        command:
        - bash
        - -c
        - |
          echo "Waiting for NVML drivers..."
          # Bounded wait: if drivers never load, exit non-zero so the kubelet
          # restarts the pod and the failure surfaces as Init:CrashLoopBackOff.
          timeout=120
          elapsed=0
          while (( elapsed < timeout )); do
            if [[ -f "/usr/local/nvidia/lib64/libnvidia-ml.so.1" ]]; then
              echo "NVML drivers found!"
              exit 0
            fi
            sleep 2
            (( elapsed += 2 ))
          done
          echo "Timed out after ${timeout}s waiting for NVML drivers." >&2
          exit 1
        volumeMounts:
        - name: nvidia-install-dir-host
          mountPath: /usr/local/nvidia
          readOnly: true
      containers:
      - name: dcgm-healthcheck
        image: <YOUR_REGISTRY>/<YOUR_REPO>/cluster-health-check:<TAG>
        imagePullPolicy: IfNotPresent
        # args: ["-check-interval=15s"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: LD_LIBRARY_PATH
          value: /usr/local/nvidia/lib64
        securityContext:
          privileged: true
        volumeMounts:
        - name: fatal-xids-config
          mountPath: /etc/dcgm-healthcheck
          readOnly: true
        - name: nvidia-install-dir-host
          mountPath: /usr/local/nvidia
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      tolerations:
      - operator: Exists
      volumes:
      - name: fatal-xids-config
        configMap:
          name: fatal-xids-config
          optional: true
      - name: nvidia-install-dir-host
        hostPath:
          path: /home/kubernetes/bin/nvidia
          type: Directory
      - name: varlog
        hostPath:
          path: /var/log
          type: Directory
